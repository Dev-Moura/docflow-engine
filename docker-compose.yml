services:

  api:
    build: .
    container_name: docflow_api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db
      - redis

    env_file:
      - .env

  db:
    image: postgres:17

    container_name: docflow_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8

    container_name: docflow_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:
